<section class="card" x-data="grindTime">
    <h2 class="card-title">Grind time corrector</h2>
    <p class="card-description">
        Use when your timed grinder gives the wrong dose.
    </p>

    <div class="mt-4 flex  gap-3">
        <label class="space-y-1">
            <span class="font-medium">Current Time</span>
            <span class="input-addon w-full">
                <input
                        x-model.number="currentTime"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
                <span class="addon">
                    s
                </span>
            </span>
        </label>

        <label class="space-y-1">
            <span class="font-medium">Actual Weight</span>
            <span class="input-addon w-full">
                <input
                        x-model.number="actualWeight"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
                <span class="addon">
                    g
                </span>
            </span>
        </label>

        <label class="space-y-1">
            <span class="font-medium">Desired Weight</span>
            <span class="input-addon w-full">
                <input
                        x-model.number="desiredWeight"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
                <span class="addon">
                    g
                </span>
            </span>
        </label>
    </div>

    <div class="mt-5 display">
        <p class="text-sm text-primary-foreground">Set Grinder To</p>
        <p class="text-4xl font-bold">
            <span x-text="format(correctedTime, 1)"></span>s
        </p>
    </div>
</section>
