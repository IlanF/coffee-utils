<section class="card" x-data="coffeeRatio">
    <h2 class="card-title">Ratio Calculator</h2>
    <p class="card-description">
        Calculate the required yield or dose for a given ratio.
    </p>

    <div class="mt-4">
        <span class="text-sm font-medium">Base</span>
        <div class="mt-3 space-x-2">
            <label class="">
                <input type="radio" name="type" value="dose" class="peer hidden" x-model="type">
                <span class="rounded-full bg-espresso-800 border border-espresso-600 px-4 py-2 peer-checked:bg-espresso-600">
                    <span class="me-1 -mt-0.5" data-lucide="weight"></span>
                    Dose
                </span>
            </label>
            <label class="">
                <input type="radio" name="type" value="yield" class="peer hidden" x-model="type">
                <span class="rounded-full bg-espresso-800 border border-espresso-600 px-4 py-2 peer-checked:bg-espresso-600">
                    <span class="me-1 -mt-0.5" data-lucide="coffee"></span>
                    Yield
                </span>
            </label>
        </div>
    </div>

    <div class="mt-4 flex gap-3">
        <label x-show="type === 'dose'" class="space-y-1">
            <span class="text-sm font-medium">Dose</span>
            <span class="input-addon w-full">
                <input
                        x-model.number="dose"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
                <span class="addon">g</span>
            </span>
        </label>
        <label x-show="type === 'yield'" class="space-y-1">
            <span class="text-sm font-medium">Output</span>
            <span class="input-addon w-full">
                <input
                        x-model.number="output"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
                <span class="addon">g</span>
            </span>
        </label>


        <label class="space-y-1">
            <span class="text-sm font-medium">Ratio</span>
            <span class="input-addon w-full">
                <span class="addon">1:</span>
                <input
                        x-model.number="ratio"
                        type="number"
                        step="0.1"
                        class="w-full"
                />
            </span>
        </label>
    </div>

    <div x-show="type === 'dose'" class="mt-5 display">
        <p class="text-sm text-accent-foreground">Target output</p>
        <p class="text-3xl font-bold">
            <span x-text="format(targetOutput, 1)"></span>g
        </p>
    </div>
    <div x-show="type === 'yield'" class="mt-5 display">
        <p class="text-sm text-accent-foreground">Required dose</p>
        <p class="text-3xl font-bold">
            <span x-text="format(reverseDose, 1)"></span>g
        </p>
    </div>
</section>
